# Despliegue GRATIS en Render (https://render.com) como un único servicio.
# Render → New → Blueprint → apunta a este repo. Crea el web service + Postgres.
#
# Notas del plan gratuito:
# - El web service soporta WebSockets, pero se "duerme" tras 15 min sin tráfico
#   (arranque en frío ~1 min) y su disco es efímero (por eso NO usamos SQLite:
#   usamos Postgres, que sí persiste).
# - El Postgres gratuito de Render EXPIRA a los 30 días. Para algo más duradero,
#   crea un Postgres gratis en Neon (https://neon.com) y pon su cadena de conexión
#   en la variable DATABASE_URL (borra el bloque `databases` y el `fromDatabase`).
# - El plan gratuito es de UNA sola instancia (sin Redis). Para escalar a varias
#   instancias necesitas plan de pago + Redis (p. ej. Upstash) en REDIS_URL.

databases:
  - name: ttt-db
    plan: free

services:
  - type: web
    name: tres-en-raya-online
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        generateValue: true # Render genera un secreto seguro automáticamente
      - key: DATABASE_URL
        fromDatabase:
          name: ttt-db
          property: connectionString
      # Para escalar horizontalmente (plan de pago), añade Redis:
      # - key: REDIS_URL
      #   value: rediss://default:TU_TOKEN@TU-DB.upstash.io:6379
