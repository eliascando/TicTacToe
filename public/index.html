<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tres en Raya Online</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="app__header">
      <h1 class="logo">Tres<span>en</span>Raya</h1>
      <p class="tagline">Multijugador online en tiempo real</p>
    </header>

    <!-- Lobby -->
    <section id="lobby" class="card view">
      <label class="field">
        <span>Tu nombre</span>
        <input id="playerName" type="text" maxlength="20" placeholder="Escribe tu nombre" autocomplete="off" />
      </label>

      <div class="lobby__actions">
        <button id="createBtn" class="btn btn--primary">Crear partida</button>
        <div class="divider"><span>o</span></div>
        <div class="join">
          <input id="joinCode" type="text" maxlength="5" placeholder="Código de sala" autocomplete="off" />
          <button id="joinBtn" class="btn btn--ghost">Unirse</button>
        </div>
      </div>
      <p id="lobbyError" class="error" role="alert"></p>
    </section>

    <!-- Game -->
    <section id="game" class="card view hidden">
      <div class="room-bar">
        <div class="room-code">
          <span class="room-code__label">Sala</span>
          <button id="copyCode" class="room-code__value" title="Copiar código">
            <span id="roomCode">-----</span>
            <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path fill="currentColor" d="M16 1H4a2 2 0 0 0-2 2v14h2V3h12V1Zm3 4H8a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2Zm0 16H8V7h11v14Z"/></svg>
        </button>
        </div>
        <button id="leaveBtn" class="btn btn--danger btn--sm">Salir</button>
      </div>

      <div class="players">
        <div id="playerX" class="player player--x">
          <span class="player__symbol">X</span>
          <span class="player__name">Esperando…</span>
          <span class="player__score">0</span>
        </div>
        <div class="players__vs">VS</div>
        <div id="playerO" class="player player--o">
          <span class="player__symbol">O</span>
          <span class="player__name">Esperando…</span>
          <span class="player__score">0</span>
        </div>
      </div>

      <p id="status" class="status">Esperando al oponente…</p>

      <div id="board" class="board" aria-label="Tablero de juego">
        <button class="cell" data-index="0" aria-label="Casilla 1"></button>
        <button class="cell" data-index="1" aria-label="Casilla 2"></button>
        <button class="cell" data-index="2" aria-label="Casilla 3"></button>
        <button class="cell" data-index="3" aria-label="Casilla 4"></button>
        <button class="cell" data-index="4" aria-label="Casilla 5"></button>
        <button class="cell" data-index="5" aria-label="Casilla 6"></button>
        <button class="cell" data-index="6" aria-label="Casilla 7"></button>
        <button class="cell" data-index="7" aria-label="Casilla 8"></button>
        <button class="cell" data-index="8" aria-label="Casilla 9"></button>
      </div>

      <div class="game__footer">
        <button id="rematchBtn" class="btn btn--primary hidden">Revancha</button>
      </div>
    </section>

    <footer class="app__footer">
      <span id="connStatus" class="conn conn--off">Conectando…</span>
    </footer>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
