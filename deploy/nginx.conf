worker_processes auto;
events { worker_connections 1024; }

http {
  # Balanceador con afinidad de sesión (ip_hash): mantiene cada cliente en la
  # misma instancia durante toda su conexión (necesario para el handshake de
  # Socket.IO). La mensajería entre instancias viaja por el adaptador de Redis.
  upstream ttt_backend {
    ip_hash;
    server app1:3000;
    server app2:3000;
  }

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  server {
    listen 80;

    location / {
      proxy_pass http://ttt_backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;      # soporte WebSocket
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 3600s;                    # conexiones WS largas
    }
  }
}
